<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spotify Sign Up</title>
  <link rel="stylesheet" href="sign.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"> 
</head>
<body>
  <div class="signup-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg" alt="Spotify Logo" class="spotify-logo">
    <h1>Sign up to<br>start listening</h1>

    <form action="/signup" method="POST">
      <label for="email">Email address</label>
      <input type="email" id="email" name="username" placeholder="name@domain.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Create a password" required>

      <button type="submit" class="btn primary">Sign Up</button>
    </form>

    <div class="divider"><span>or</span></div>

    <button class="btn social google"><i class="fab fa-google"></i> Sign up with Google</button>
    <button class="btn social facebook"><i class="fab fa-facebook-f"></i> Sign up with Facebook</button>
    <button class="btn social apple"><i class="fab fa-apple"></i> Sign up with Apple</button>

    <p class="login-link">Already have an account? <a href="login.html">Log in here</a>.</p>
    <% if (typeof error !== "undefined") { %>
     <div class="error-message" style="color:red; margin-top: 10px;"><%= error %></div>
   <% } %>

   

  </div>
</body>
</html>
